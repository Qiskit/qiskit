---
name: Test Windows
on:
  workflow_call:
    inputs:
      python-version:
        description: >
          Python version to currently test
        type: string
        required: true
      runner:
        description: >
          Describes the system this workflow should run on.
        type: string
        required: true
      install-optionals:
        description: >
          Decides whether we install optyional dependencies
        type: boolean
        default: false
      mimalloc:
        description: >
          Whether to build with mimalloc or not
        type: boolean
        default: true
jobs:
  test-windows:
    name: ${{ inputs.runner }} - Python ${{ inputs.python-version }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 60
    env:
      QISKIT_TEST_CAPTURE_STREAMS: 1
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - name: Cache stestr
        uses: actions/cache@v5
        with:
          key: 'stestr | "${{ runner.os }}" | "${{ inputs.python-version }}" | "${{ github.run_id }}"'
          restore-keys: |
            stestr | "${{ runner.os }}" | "${{ inputs.python-version }}"
            stestr | "${{ runner.os }}"
            stestr
          path: .stestr
      - name: Set mimalloc for build
        if: ${{ inputs.mimalloc }}
        run: 'echo "QISKIT_BUILD_WITH_MIMALLOC=1" >> $GITHUB_ENV'
      - name: Install dependencies
        run: |
          python -m venv test-job
          .\test-job\Scripts\activate
          python -m pip install -U pip
          python -m pip install -U `
            -c constraints.txt `
            --group test `
            -e .
          pip check
      - name: Install Optional packages
        run: |
          .\test-job\Scripts\activate
          pip install -c constraints.txt --group optionals-all
          pip check
        if: ${{ inputs.install-optionals }}
      - name: Run Tests
        run: |
          chcp.com 65001
          .\test-job\Scripts\activate
          python tools/report_numpy_state.py
          $Env:PYTHONHASHSEED=$(python -S -c "import random; print(random.randint(1, 1024))")
          echo "PYTHONHASHSEED=$PYTHONHASHSEED"
          stestr run --slowest --abbreviate
      - name: Filter stestr history
        run: |
          pushd .stestr
          ls | grep -P "^\d" | xargs -d "\n" rm -f
          popd
        env:
          LANG: "C.UTF-8"
          PYTHONIOENCODING: "utf-8:backslashreplace"
          QISKIT_PARALLEL: FALSE
          QISKIT_IGNORE_USER_SETTINGS: TRUE
          RUST_BACKTRACE: 1
      - name: Copy and Publish images
        uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: copied-images-${{ runner.name }}-tests-Python-${{ inputs.python-version }}
          path: "**/*.png"
          if-no-files-found: error
