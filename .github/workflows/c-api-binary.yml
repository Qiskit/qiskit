name: Upload C API Binaries
on:
  push:
    tags:
      - "*"
jobs:
  c-api-binary-linux:
    runs-on: quay.io/pypa/manylinux2014_x86_64
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cbindgen
        run: |
          cargo install cbindgen
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Set Environment Variables
        run: |
          QISKIT_CEXT_DIR="qiskit-cext-${{ env.GITHUB_REF_NAME }}-linux-amd64"
          echo "QISKIT_CEXT_DIR=${QISKIT_CEXT_DIR}" >> $GITHUB_ENV
          echo "C_DIR_OUT=${QISKIT_CEXT_DIR}/dist/c" >> $GITHUB_ENV
          echo "C_DIR_OUT: $C_DIR_OUT"
      - name: Build Binary
        run: |
          # Compile Qiskit C API with PGO profile enabled
          export C_LIB_RUSTC_FLAGS="--Cprofile-generate=/tmp/pgo-data"
          make c \
            C_DIR_OUT="${{ env.C_DIR_OUT }}"

          # Compile PGO script
          gcc tools/pgo_scripts/test_utility_scale.c \
            -o test_utility_scale.o \
            -O0 \
            -I ${{ env.C_DIR_OUT }}/include \
            -L ${{ env.C_DIR_OUT }}/lib \
            -lqiskit \
            -Wl,-rpath,${{ env.C_DIR_OUT }}/lib

          # Generate PGO profile
          ./test_utility_scale.o

          # Merge PGO profile data
          rustup component add llvm-tools-preview
          PROFDATA="$(find ~/.rustup -name 'llvm-profdata')"
          ${PROFDATA} merge -o ./merged.profdata /tmp/pgo-data

          # Re-compile Qiskit C API with merged PGO data
          make cclean
          export C_LIB_RUSTC_FLAGS="-Cprogile-use=merged.profdata"
          make c \
            C_DIR_OUT="${{ env.C_DIR_OUT }}"

          # Move C API Binary Installation Makefile into binary
          mv tools/c_api_binary_makefile "${{ env.QISKIT_CEXT_DIR }}/Makefile"
      - name: Validate Binaries
        run: |
          make ctest \
            SKIP_BUILD=1 \
            C_DIR_TEST="${{ env.C_DIR_OUT }}" \
            C_DIR_TEST_INCLUDE="${{ env.C_DIR_OUT }}/include" \
            C_DIR_TEST_LIB="${{ env.C_DIR_OUT }}/lib"
      - name: Archive Binaries
        run: |
          tar czf ${{ env.QISKIT_CEXT_DIR }}.tar.gz ${{ env.QISKIT_CEXT_DIR }}
      - name: Release
        run: |
          TARFILE="${{ env.QISKIT_CEXT_DIR }}.tar.gz"

          if [[ ! -f "$TARFILE" ]];
          then
          echo "File not found: $TARFILE"
            exit 1
          fi

          gh release upload \
            --repo ${{ github.repository }} \
            ${{ github.ref_name }} \
            ${{ env.QISKIT_CEXT_DIR }}.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  c-api-binary-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cbindgen
        run: |
          cargo install cbindgen
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Set Environment Variables
        run: |
          QISKIT_CEXT_DIR="qiskit-c-${{ env.GITHUB_REF_NAME }}-macos-arm64"
          echo "QISKIT_CEXT_DIR=${QISKIT_CEXT_DIR}" >> $GITHUB_ENV
          echo "C_DIR_OUT=${QISKIT_CEXT_DIR}/dist/c" >> $GITHUB_ENV
          echo "C_DIR_OUT: $C_DIR_OUT"
      - name: Build Binary
        run: |
          # Compile Qiskit C API with PGO profile enabled
          export C_LIB_RUSTC_FLAGS="--Cprofile-generate=/tmp/pgo-data"
          make c \
            C_DIR_OUT="${{ env.C_DIR_OUT }}"

          # Compile PGO script
          clang tools/pgo_scripts/test_utility_scale.c \
            -o test_utility_scale.o \
            -O0 \
            -I ${{ env.C_DIR_OUT }}/include \
            -L ${{ env.C_DIR_OUT }}/lib \
            -lqiskit \
            -Wl,-rpath,${{ env.C_DIR_OUT }}/lib

          # Generate PGO profile
          ./test_utility_scale.o

          # Merge PGO profile data
          rustup component add llvm-tools-preview
          PROFDATA="$(find ~/.rustup -name 'llvm-profdata')"
          ${PROFDATA} merge -o ./merged.profdata /tmp/pgo-data

          # Re-compile Qiskit C API with merged PGO data
          make cclean
          export C_LIB_RUSTC_FLAGS="-Cprogile-use=merged.profdata"
          make c \
            C_DIR_OUT="${{ env.C_DIR_OUT }}"

          # Move C API Binary Installation Makefile into binary
          mv tools/c_api_binary_makefile "${{ env.QISKIT_CEXT_DIR }}/Makefile"
      - name: Validate Binaries
        run: |
          make ctest \
            SKIP_BUILD=1 \
            C_DIR_TEST_INCLUDE="${{ env.C_DIR_OUT }}/include" \
            C_DIR_TEST_LIB="${{ env.C_DIR_OUT }}/lib" \
      - name: Archive Binaries
        run: |
          # macos requires the dylib name to be changed separately
          # install_name_tool -id libqiskit.dylib ${{ env.C_DIR_OUT }}/lib/libqiskit.dylib

          # macos requires that rpath is added separately (enables using `-Wl,-rpath` in place of setting DYLD_LIBRARY_PATH)
          # install_name_tool -add_rpath ${{ env.C_DIR_OUT }}/lib ${{ env.C_DIR_OUT }}/lib/libqiskit.dylib
          tar czf ${{ env.QISKIT_CEXT_DIR }}.tar.gz ${{ env.QISKIT_CEXT_DIR }}
      - name: Release
        run: |
          TARFILE="${{ env.QISKIT_CEXT_DIR }}.tar.gz"

          if [[ ! -f "$TARFILE" ]];
          then
          echo "File not found: $TARFILE"
            exit 1
          fi

          gh release upload \
            --repo ${{ github.repository }} \
            ${{ github.ref_name }} \
            ${{ env.QISKIT_CEXT_DIR }}.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
