---
name: Deploy release artifacts
on:
  push:
    tags:
      - '*'
jobs:
  build-core:
    name: Build core
    uses: ./.github/workflows/wheels-build.yml
    with:
      artifact-prefix: "deploy-core-"
      default-action: "skip"
      wheels-tier-1: "build"
      sdist: "build"
  upload-core:
    name: Deploy core
    needs: ["build-core"]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: 'deploy-core-*'
          merge-multiple: true
          path: deploy
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: deploy

  build-others:
    name: Build others
    uses: ./.github/workflows/wheels-build.yml
    with:
      artifact-prefix: "deploy-others-"
      default-action: "build"
      wheels-tier-1: "skip"
      sdist: "skip"
  upload-others:
    name: Deploy other
    # The tier 2/3 wheels mustn't block the tier 1 ones on build failures, nor
    # can they deploy before the tier 1 ones (and sdist) have succeeded, because
    # we never want to be in a situation where the newest version doesn't have
    # the top-tier wheels available.
    needs: ["build-others", "upload-core"]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: 'deploy-others-*'
          merge-multiple: true
          path: deploy
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: deploy
