deprecations_synthesis:
  - The some of the arguments in the function :func:`.qs_decomposition` are now deprecated:

      * `opt_a1` and `opt_a2` are not longer needed, as the funcion automatically determine if the optimizations should run
      *  `decomposer_1q` wont accept any callable anymore, only instances of :class:`.OneQubitBasisDecomposer`
      * `decomposer_2q` wont accept any callable anymore, only instances of :class:`.TwoQubitBasisDecomposer`
