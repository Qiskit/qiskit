---
features_transpiler:
  - |
    Added a new transpiler pass, :class:`.TwoQubitPeepholeOptimization`, which
    supersedes the previous combination of :class:`.ConsolidateBlocks` and :class:`.UnitarySynthesis`
    when ``optimization_level`` is 2 or 3 in the preset compiler pipelines.

    The new unified pass is better able to determine when two-qubit blocks can be resynthesized to
    improve the estimated fidelity of the circuit, resulting in higher quality compilations,
    especially in the case of over-complete bases or heterogeneous :class:`.Target` objects.  It
    also has better threaded parallelization of its analysis and synthesis.
performance:
  - |
    The new :class:`.TwoQubitPeepholeOptimization` transpiler pass is now used as part of
    the preset pass managers, as generated by :func:`.generate_preset_pass_manager` and used
    internally by :func:`.transpile`, for the :ref:`transpiler-preset-stage-optimization`
    in optimization levels 2 and 3. This replaces those levels' previous use of the
    :class:`.ConsolidateBlocks` and :class:`.UnitarySynthesis` transpiler passes in the
    optimization stage to perform peephole optimization. The new pass offers improved
    runtime performance and better fidelity-aware heuristics for synthesis.
