---
fixes:
  - |
    Fixed an issue where the ``transpile_optimization_level`` user-configuration
    file field would not be respected when calling :func:`.generate_preset_pass_manager`.  It
    previously only affected :func:`.transpile`.
features_transpiler:
  - |
    A default for the ``seed_transpiler`` argument of :func:`.transpile` and
    :func:`.generate_preset_pass_manager` can now be set via the ``transpiler_seed`` field in the
    user-configuration file.
  - |
    A default for the ``seed_transpiler`` argument of :func:`.transpile` and
    :func:`.generate_preset_pass_manager` can now be set via the environment variable
    ``QISKIT_TRANSPILER_SEED``, which takes precedence over the equivalent key in a
    user-configuration file.
