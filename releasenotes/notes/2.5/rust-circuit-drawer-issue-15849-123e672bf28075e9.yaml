---
features_visualization:
  - The C-API circuit drawer (:c:func:`qk_circuit_draw`)
    now supports :class:`.PauliProductMeasurement` and
    :class:`.PauliProductRotationGate` gates.
  - The C-API circuit drawer (:c:func:`qk_circuit_draw`) now uses a fractional display for
    angles close to simple fractions of :math:`\pi`, similar to the Python-space visualizers.
  - The C-API circuit drawer (:c:func:`qk_circuit_draw`) now draws measurements and
    :class:`.CPhaseGate` operations more clearly.
