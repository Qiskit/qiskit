---
fixes:
  - |
    Fixed :meth:`.LinearFunction.inverse` always raising :exc:`.CircuitError` on call.
    See `#16184 <https://github.com/Qiskit/qiskit/issues/16184>`__.

features_circuits:
  - |
    Specialized :meth:`.LinearFunction.inverse` so that it returns a
    :class:`.LinearFunction` representing the inverse transformation, instead of failing to
    construct an opaque :class:`~.circuit.Instruction`.
