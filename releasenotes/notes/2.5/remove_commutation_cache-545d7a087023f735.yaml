---
deprecations_circuits:
  - |
    The :class:`.CommutationChecker` no longer maintains an internal cache of commutation
    relationships.  The following items are therefore now deprecated, and will be removed in Qiskit
    v3.0:

    * the ``cache_max_entries`` argument of the contructor; setting this now has no effect.
    * :meth:`~.CommutationChecker.clear_cached_commutations` method; calling this has no effect.
    * the :meth:`~.CommutationChecker.num_cached_entries` method; calling this will always return 0.
