features_c:
  - |
    Added :c:func:`qk_circuit_global_phase` and :c:func:`qk_dag_global_phase`, which retrieve the
    global phases of :c:type:`QkCircuit` and :c:type:`QkDag`, respectively.
  - |
    Added :c:func:`qk_circuit_set_global_phase` and :c:func:`qk_dag_set_global_phase`, which set the
    global phases of :c:type:`QkCircuit` and :c:type:`QkDag`, respectively.
