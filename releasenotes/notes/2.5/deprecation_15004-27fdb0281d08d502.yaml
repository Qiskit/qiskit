---
deprecations_synthesis:
  - |
    Several behaviors of arguments of :func:`.qs_decomposition` are now deprecated and will be
    removed in Qiskit v3.0.

    * Setting ``opt_a1`` and ``opt_a2`` is no longer necessary; the function automatically determines
      whether the optimizations can apply.

    * ``decomposer_1q`` and ``decomposer_2q`` should be instances of
      :class:`.OneQubitBasisDecomposer` or :class:`.TwoQubitBasisDecomposer`, respectively; using
      arbitrary Python callables is non-performant compared to the Rust core.
