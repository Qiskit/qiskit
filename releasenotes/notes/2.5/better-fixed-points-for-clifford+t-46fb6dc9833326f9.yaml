---
features_transpiler:
  - |
    Added a new argument ``getter`` to the :class:`.FixedPoint` analysis pass.
    This optional callback can be provided to derive a value from the
    :class:`.PropertySet` instead of reading a single key directly.

performance:
  - |
    Improved the performance of optimization levels 1, 2 and 3 when compiling to Clifford+T
    basis sets, in particular for very deep circuits.  Previously the depth of the circuit was
    used as indicator of whether a fixed point in the optimization stages has been reached,
    which has been replaced by the RZ and T counts (depending on the optimization stage).
    This is not only significantly faster, but also reflects the target metric better.
    See `#16218 <https://github.com/Qiskit/qiskit/pull/16218>`__ for more details.
