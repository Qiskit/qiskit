---
features_transpiler:
  - |
    Added a new transpiler pass :class:`.ConvertToPauliRotations`,
    that converts a quantum circuit containing single-qubit, two-qubit and three-qubit 
    standard gates, barriers and measurements, into an equivalent list of
    :class:`.PauliProductRotationGate` and a global phase, as well as
    :class:`.PauliProductMeasurement`.
