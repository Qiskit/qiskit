---
features_transpiler:
  - |
    :func:`.transpile` now accepts a :class:`.Target` instance as the second positional
    argument (the ``backend`` parameter). When a :class:`.Target` is passed this way, it
    is treated as if it had been passed via the ``target`` keyword argument, consistent
    with the existing behaviour of :func:`.generate_preset_pass_manager`. This allows
    users to write::

        transpile(circuit, target)

    instead of::

        transpile(circuit, target=target)

    A :exc:`TypeError` is raised if a :class:`.Target` is passed positionally and
    ``target`` is also specified as a keyword argument.
    Fixed `#15066 <https://github.com/Qiskit/qiskit/issues/15066>`__.
