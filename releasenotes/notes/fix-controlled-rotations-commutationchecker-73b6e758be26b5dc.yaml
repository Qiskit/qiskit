---
fixes:
  - |
    Fixed a bug in :class:`.CommutationChecker` when evaluating commutativity relations between
    controlled-rotation gates :class:`.CRXGate`, :class:`.CRYGate` or :class:`.CRZGate`, and other
    standard gates. This affected :class:`.CommutationAnalysis`,
    :class:`.CommutativeCancellation`, :class:`.CommutativeOptimization` and
    :c:func:`qk_transpiler_pass_standalone_commutative_cancellation`.  See
    `#16164 <https://github.com/Qiskit/qiskit/issues/16164>`__.
