features_c:
  - |
    The C API now exposes the global phase of both Circuits and DAGs, allowing the user to retrieve it and set it. This is done via the C API's `QkParam`, meaning numeric as well as symbolic parameters are permitted. Importantly, the user retains ownership of the parameters, meaning the phase values must be freed via :c:func:`qk_free_param` after usage both when retrieving and when setting the phase.

    .. code-block:: c
        QkCircuit *qc = qk_circuit_new(2, 0);
        
        QkParam *out_phase = qk_circuit_global_phase(qc);
        double out_phase_val = qk_param_as_real(out_phase);
        qk_param_free(out_phase);
        
        QkParam *in_phase = qk_param_from_double(1.23);
        qk_circuit_set_global_phase(qc, in_phase);
        qk_param_free(in_phase);
        
        qk_circuit_free(qc);
