fixes:
  - |
    Fixes `#15134 <https://github.com/Qiskit/qiskit/issues/15134>`__.

features_c:
  - |
    Improves string formatting for sparse observables :c:struct:`QkObs` and
    individual terms :c:struct:`QkObsTerm`. The functions :c:func:`qk_obs_str`
    and :c:func:`qk_obsterm_str` now return a format that matches that of the
    Python :python:class:`SparseObservable`.
    For example, the observable connstructed with the code below will now be
    formatted as

    <QkObs with 2 terms on 100 qubits: (1+2j)(Y_1 X_0) + (-1+0j)(-_99 +_98)>

    .. code-block:: c
      uint32_t num_qubits = 100;
      uint64_t num_terms = 2;
      uint64_t num_bits = 4;
      QkComplex64 coeffs[] = {{1, 2}, {-1, 0}};

      QkBitTerm bits[4] = {QkBitTerm_X, QkBitTerm_Y, QkBitTerm_Plus, QkBitTerm_Minus};

      uint32_t indices[4] = {0, 1, 98, 99};
      size_t boundaries[3] = {0, 2, 4};
      QkObs *obs = qk_obs_new(
          num_qubits, num_terms, num_bits, &coeffs[0], bits, indices, boundaries
      );