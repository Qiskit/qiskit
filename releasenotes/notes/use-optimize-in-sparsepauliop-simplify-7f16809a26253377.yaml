---
features:
  - |
    Added :meth:`.ParameterExpression.optimize`, which returns an algebraically
    simplified copy of the expression using Qiskit's native symbolic engine,
    without requiring the optional ``sympy`` dependency. For example,
    ``(a + b - a - b).optimize()`` evaluates to ``0``.
fixes:
  - |
    :meth:`.SparsePauliOp.simplify` no longer requires the optional ``sympy``
    dependency when simplifying operators with :class:`.ParameterExpression`
    coefficients. It previously called ``sympify`` to detect coefficients that
    algebraically cancel to zero; it now uses the native
    :meth:`.ParameterExpression.optimize`, so cancellations such as
    ``a + b - a - b`` are still detected and removed while working in a default
    Qiskit install without ``sympy``.